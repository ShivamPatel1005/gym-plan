      {name:"Pec Fly", sets:"3 sets × 12, 10, 8 reps", machine:"Pec Deck Machine", how:"Same as Wednesday. Hold the squeeze at the center for 2 seconds.", why:"That 2 second squeeze = better chest shape over time"},
      {name:"Tricep Pushdown", sets:"3 sets × 12, 10, 8 reps", machine:"Cable Machine — rope at top", how:"Same as Wednesday.", why:""},
      {name:"Reverse Pushdown", sets:"3 sets × 12, 10, 8 reps", machine:"Cable Machine — bar at top", how:"Same as Wednesday.", why:""},
      {name:"Botharons Extension", sets:"3 sets × 12, 10, 8 reps", machine:"One dumbbell held with both hands", how:"Same as Wednesday.", why:""},
      {name:"Dips", sets:"3 sets × 12, 10, 8 reps", machine:"Parallel Dip Bars", how:"Same as Wednesday.", why:""},
    ],
    cooldown:"Same as Wednesday — chest doorway stretch and tricep overhead stretch.",
    diabetes:"Saturday is your last hard training day. Eat a proper recovery meal tonight — rice or roti + dal or chicken + vegetables. Check your weekly glucose readings today and see if training days show lower numbers than rest day.",
    stamina:""
  },
  {
    day:"Sun", tag:"Full Rest",
    color:"#444", colorBg:"#111", colorText:"#777",
    title:"Full Rest Day", focus:"", rest:true,
    restTips:[
      "No gym today — complete rest",
      "This is when your muscles actually grow and repair",
      "Sleep 8–9 hours tonight",
      "Eat well — protein in every meal (eggs, dal, paneer, chicken)",
      "Light walk after dinner is fine and good for blood sugar",
      "Review your glucose readings from this week"
    ],
    diabetes:"Sunday is your most stable blood sugar day. Good day to check your weekly average and share observations with your endocrinologist at the next visit. If you trained consistently this week, your insulin sensitivity will be better than last week.",
    stamina:""
  }
];

let activeDay = 0;
let openEx = -1;


function render() {
  const d = plan[activeDay];

  // Tabs
  const tabsEl = document.getElementById('tabs');
  tabsEl.innerHTML = '';
  plan.forEach((p, i) => {
    const btn = document.createElement('button');
    btn.className = 'tab-btn';
    btn.style.background = activeDay === i ? p.color : '#111';
    btn.style.color = activeDay === i ? '#fff' : '#444';
    btn.style.boxShadow = activeDay === i ? '0 0 12px ' + p.color + '55' : 'none';
    btn.innerHTML = p.day + '<div class="tab-sub" style="color:' + (activeDay===i?'rgba(255,255,255,0.7)':'#333') + '">' + (p.rest ? 'REST' : p.tag.split('&')[0].trim().toUpperCase().slice(0,5)) + '</div>';
    btn.onclick = () => { activeDay = i; openEx = -1;  render(); };
    tabsEl.appendChild(btn);
  });

  // Content
  const content = document.getElementById('content');

  if (d.rest) {
    content.innerHTML = `
      <div class="day-tag-row">
        <span class="day-tag" style="background:${d.colorBg};color:${d.colorText}">${d.tag}</span>
      </div>
      <div class="day-title">${d.title}</div>
      <div class="rest-wrap">
        <div class="rest-moon">🌙</div>
        <div class="rest-title">Rest & Recover</div>
        <div class="rest-sub">Muscles repair and grow on rest days.<br>This is not a skip — it is part of the plan.</div>
        <div class="rest-tips">${d.restTips.map(t=>`<div class="rest-tip"><span class="rest-tick">✓</span>${t}</div>`).join('')}</div>
        <div class="diabetes-box" style="width:100%">
          <div class="diabetes-label">🩺 DIABETES NOTE</div>
          <div class="diabetes-text">${d.diabetes}</div>
        </div>
      </div>`;
    return;
  }

  let html = `
    <div class="day-tag-row">
      <span class="day-tag" style="background:${d.colorBg};color:${d.colorText}">${d.tag}</span>
      ${d.sameAs ? `<span class="same-as">${d.sameAs}</span>` : ''}
    </div>
    <div class="day-title">${d.title}</div>
    <div class="day-focus">${d.focus}</div>
    <br>
    <div class="time-box">
      <div class="time-label">⏱ TODAY'S SESSION</div>
      <div class="time-val">${d.time}</div>
    </div>
    <div class="warmup-box">
      <div class="warmup-label">🔥 WARM-UP — DO THIS FIRST</div>
      <div class="warmup-text">${d.warmup}</div>
    </div>
    <div class="ex-section-label">Exercises — tap each one to see how to do it</div>`;

  d.exercises.forEach((e, i) => {
    const isOpen = openEx === i;
    html += `
      <div class="ex-card" id="excard-${i}" style="background:#0d0d15;border:1px solid ${isOpen ? d.color : '#1a1a25'};box-shadow:${isOpen ? '0 0 8px '+d.color+'33' : 'none'}">
        <button class="ex-header" onclick="toggleEx(${i})">
          <div class="ex-num" style="background:${d.colorBg};color:${d.colorText}">${i+1}</div>
          <div style="flex:1;min-width:0">
            <div class="ex-name">${e.name}</div>
            <div class="ex-sets" style="color:${d.colorText}">${e.sets}</div>
          </div>
          <div class="ex-arrow">${isOpen ? '▲' : '▼'}</div>
        </button>
        ${isOpen ? `
        <div class="ex-body">
          <div class="ex-row">
            <span class="ex-icon">📍</span>
            <div>
              <div class="ex-row-label" style="color:#5ba3d9">WHICH MACHINE / EQUIPMENT</div>
              <div class="ex-row-text" style="color:#7ab8d8">${e.machine}</div>
            </div>
          </div>
          <div class="ex-row">
            <span class="ex-icon">▶️</span>
            <div>
              <div class="ex-row-label" style="color:#aaa">HOW TO DO IT — STEP BY STEP</div>
              <div class="ex-row-text" style="color:#ccc">${e.how}</div>
            </div>
          </div>
          ${e.why ? `<div class="ex-why"><span style="font-size:14px">💡</span><div class="ex-why-text">${e.why}</div></div>` : ''}
        </div>` : ''}
      </div>`;
  });

  html += `
    <div class="cooldown-box">
      <div class="cooldown-label">🧘 COOL-DOWN STRETCH — 10 MIN</div>
      <div class="cooldown-text">${d.cooldown}</div>
    </div>
    <div class="diabetes-box">
      <div class="diabetes-label">🩺 DIABETES NOTE FOR TODAY</div>
      <div class="diabetes-text">${d.diabetes}</div>
    </div>`;

  content.innerHTML = html;
}

function toggleEx(i) {
  openEx = openEx === i ? -1 : i;
  render();
}



render();
</script>
</body>
</html>
